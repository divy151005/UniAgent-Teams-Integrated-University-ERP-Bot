server.port=8080
spring.application.name=university-erp-agent

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/university_erp
spring.data.mongodb.database=university_erp

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Azure Graph Configuration (TODO: Replace with your Azure app values)
azure.graph.tenant-id=YOUR_TENANT_ID
azure.graph.client-id=YOUR_CLIENT_ID
azure.graph.client-secret=YOUR_CLIENT_SECRET

# Bot Configuration
bot.microsoft.app-id=YOUR_BOT_APP_ID
bot.microsoft.app-password=YOUR_BOT_APP_PASSWORD

# Logging
logging.level.com.university=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.microsoft.bot=DEBUG
